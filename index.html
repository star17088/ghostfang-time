<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고스트팡 시간권 관리</title>

  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">G</div>
        <div>
          <h1>Ghost Fang</h1>
          <p>Time System</p>
        </div>
      </div>

      <nav class="menu">
        <button class="menu-btn active" data-page="dashboard">대시보드</button>
        <button class="menu-btn" data-page="entry">입장 등록</button>
        <button class="menu-btn" data-page="active">이용자 목록</button>
        <button class="menu-btn" data-page="checkout">퇴장 처리</button>
        <button class="menu-btn" data-page="tv">TV 화면</button>
        <button class="menu-btn" data-page="settings">설정</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">대시보드</h2>
          <p id="pageDesc">오늘의 팔찌 시간권 이용 현황을 확인합니다.</p>
        </div>

        <div class="top-actions">
          <button class="secondary-btn" id="refreshBtn">새로고침</button>
          <button class="primary-btn" id="quickEntryBtn">입장 등록</button>
        </div>
      </header>

      <section id="content" class="content">
        <!-- JS에서 화면이 들어올 자리 -->
      </section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
